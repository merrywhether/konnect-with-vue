<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" href="/favicon.ico" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Konnect with Vue</title>
        <style>
            /* Prevent FOUC: set html background before JS runs.
               Uses hardcoded bgSecondary values from each theme.
               System/light users see correct color immediately;
               dark-choice-on-light-system users get a brief flash. */
            html { background-color: #F8F8FA; }
            @media (prefers-color-scheme: dark) {
                html { background-color: #1E1F1D; }
            }
        </style>
    </head>

    <body>
        <div id="app"></div>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
