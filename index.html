<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" href="/favicon.ico" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Konnect with Vue</title>
        <meta
            name="description"
            content="A toy app for learning vue by @merrywhether."
        />

        <!-- Tab bar color: matches FOUC background values below -->
        <meta
            name="theme-color"
            content="#F8F8FA"
            media="(prefers-color-scheme: light)"
        />
        <meta
            name="theme-color"
            content="#000000"
            media="(prefers-color-scheme: dark)"
        />

        <!-- Open Graph / link preview -->
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://konnect-with-vue.risto.dev/" />
        <meta property="og:title" content="Konnect with Vue" />
        <meta
            property="og:description"
            content="A toy app for learning Vue.js by @merrywhether."
        />
        <meta
            property="og:image"
            content="https://konnect-with-vue.risto.dev/og_image.jpg"
        />

        <meta name="twitter:card" content="summary" />
        <meta name="twitter:title" content="Konnect with Vue" />
        <meta
            name="twitter:description"
            content="A toy app for learning vue by @merrywhether."
        />
        <meta
            name="twitter:image"
            content="https://konnect-with-vue.risto.dev/og_image.jpg"
        />
        <meta name="twitter:card" content="summary_large_image" />
        <style>
            /* Prevent FOUC: set html background before JS runs.
               Uses hardcoded bgSecondary values from each theme.
               System/light users see correct color immediately;
               dark-choice-on-light-system users get a brief flash. */
            html {
                background-color: #f8f8fa;
            }
            @media (prefers-color-scheme: dark) {
                html {
                    background-color: #1e1f1d;
                }
            }
        </style>
    </head>

    <body>
        <div id="app"></div>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
